<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../assets/images/icons8-tic-tac-toe-32.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
</head>
<body>
    <h1>Tic-Tac-Toe</h1>
    <hr>
    <div id="mode-selector">
        <div class="input">
            <p id="c">✕</p>
            <input type="text" id="cross" placeholder="Enter name">
        </div>
        <div class="input">
            <p>◯</p>
            <input type="text" id="ovel" placeholder="Enter name">
        </div>
        <input type="button" id="play" value="Play">
    </div>
    <input type="button" id="rules" value="Back">
    <script src="../js/fr-input.js"></script>
</body>
</html>
