<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/index.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
</head>
<body>
    <div id="box">
        <h1>Tic-Tac-Toe</h1>
        <div id="mode">
            <h3>Choose mode</h3>
            <input type="button" value="Simple" class="m" id="simple">
            <input type="button" value="Medium" class="m" id="medium">
            <input type="button" value="Hard" class="m" id="hard">
            <h4>Choose side</h4>
            <div id="side">
                <input type="button" value="✕" id="cross">
                <input type="button" value="◯" id="ovel">
            </div>
        </div>
        <input type="button" id="play" value="Play Game">
    </div>
    <script src="js/index.js"></script>
</body>
</html>
